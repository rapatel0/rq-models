# RotorQuant LLM Server — Docker Compose with model profiles
#
# Usage:
#   docker compose --profile qwen up          # Qwen3.6-35B-A3B MoE (default, 32GB+)
#   docker compose --profile reasoning up     # Qwen3.5-27B Claude Reasoning Distilled
#   docker compose --profile gemma up         # Gemma 4 26B MoE
#
# Configuration via env vars:
#   KV_CACHE_TYPE=f16 docker compose --profile qwen up     # disable RotorQuant
#   CTX_SIZE=32768 docker compose --profile qwen up        # override context (default per-model)
#   PORT=9090 docker compose --profile qwen up -p 9090:9090
#
# Throughput mode (parallel slots):
#   docker compose --profile qwen-throughput up            # 14 slots × 16K on 32GB

x-llm-base: &llm-base
  image: rotorquant:latest
  build:
    context: .
    dockerfile: docker/Dockerfile
  volumes:
    - llm-models:/models
    - ${HF_HOME:-${HOME}/.cache/huggingface}/token:/home/llm/.cache/huggingface/token:ro
  ports:
    - "${PORT:-8080}:${PORT:-8080}"
  environment:
    KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
    CTX_SIZE: ${CTX_SIZE:-}
    PORT: ${PORT:-8080}
    GPU_LAYERS: ${GPU_LAYERS:-99}
    N_PARALLEL: ${N_PARALLEL:-2}
    CACHE_RAM: ${CACHE_RAM:-8192}
    HF_TOKEN: ${HF_TOKEN:-}
    EXTRA_ARGS: ${EXTRA_ARGS:-}
    # Speculative decoding (Sprint 004) — defaults are off; per-profile overrides below.
    SPECULATIVE_MODE: ${SPECULATIVE_MODE:-target-only}
    DRAFT_MODEL_NAME: ${DRAFT_MODEL_NAME:-}
    DRAFT_KV_CACHE_TYPE: ${DRAFT_KV_CACHE_TYPE:-}
    DRAFT_N_MAX: ${DRAFT_N_MAX:-16}
    EXPERIMENTAL: ${EXPERIMENTAL:-0}
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  restart: unless-stopped

services:
  # Default profile: Qwen3.6-35B-A3B MoE + DFlash speculative decoding.
  # The 35B-A3B/DFlash pair is the validated default after Sprint 004 — smoke
  # demonstrated 100% acceptance + 128.9 tok/s on a thinking-on greedy probe.
  # Single-slot by default (multi-slot serializes through the shared draft
  # context). Source-converted draft GGUF is required: run `make convert-drafts`
  # once before the first launch.
  qwen:
    <<: *llm-base
    profiles: [qwen]
    container_name: rotorquant-qwen
    environment:
      MODEL_NAME: qwen3.6-35b
      # iso3: K+V both at 3.125 bpe — best PPL for Qwen3.6 MoE at this memory budget.
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-iso3}
      # 131K context per single slot — leaves headroom for target weights (~20 GB
      # Q4_K_XL) + draft weights (~1 GB bf16) + KV (<1 GB iso3 hybrid) on 32 GB.
      # Bump to 262K with care; KV is small at iso3 hybrid but draft scales too.
      CTX_SIZE: ${CTX_SIZE:-131072}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-1}
      CACHE_RAM: ${CACHE_RAM:-2048}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}
      SPECULATIVE_MODE: dflash
      DRAFT_MODEL_NAME: qwen3.6-35b-dflash
      DRAFT_KV_CACHE_TYPE: ${DRAFT_KV_CACHE_TYPE:-iso3}
      DRAFT_N_MAX: ${DRAFT_N_MAX:-16}

  # Target-only Qwen3.6-35B-A3B MoE — opt-in for users who want to skip
  # speculative decoding (e.g. multi-user throughput, where multi-slot
  # speculative serializes through the draft context). Same model + KV
  # config as `qwen`, just SPECULATIVE_MODE=target-only and N_PARALLEL=2.
  qwen-target-only:
    <<: *llm-base
    profiles: [qwen-target-only]
    container_name: rotorquant-qwen-target-only
    environment:
      MODEL_NAME: qwen3.6-35b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-iso3}
      CTX_SIZE: ${CTX_SIZE:-524288}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-2}
      CACHE_RAM: ${CACHE_RAM:-2048}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}
      SPECULATIVE_MODE: target-only

  qwen36-q3:
    <<: *llm-base
    profiles: [qwen36-q3]
    container_name: rotorquant-qwen36-q3
    environment:
      MODEL_NAME: qwen3.6-35b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen36-iq3:
    <<: *llm-base
    profiles: [qwen36-iq3]
    container_name: rotorquant-qwen36-iq3
    environment:
      MODEL_NAME: qwen3.6-35b-iq3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── Qwen3.6-27B dense ────────────────────────────────────────────────
  qwen36-27b:
    <<: *llm-base
    profiles: [qwen36-27b]
    container_name: rotorquant-qwen36-27b
    environment:
      MODEL_NAME: qwen3.6-27b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-131072}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-2}
      CACHE_RAM: ${CACHE_RAM:-8192}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen36-27b-q3:
    <<: *llm-base
    profiles: [qwen36-27b-q3]
    container_name: rotorquant-qwen36-27b-q3
    environment:
      MODEL_NAME: qwen3.6-27b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen36-27b-iq3:
    <<: *llm-base
    profiles: [qwen36-27b-iq3]
    container_name: rotorquant-qwen36-27b-iq3
    environment:
      MODEL_NAME: qwen3.6-27b-iq3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── DFlash speculative decoding (Sprint 004) ─────────────────────────
  # Default N_PARALLEL=1 — multi-slot speculative is functionally correct but
  # serializes through the shared draft context (server-context.cpp:779).
  # Override N_PARALLEL>1 for throughput experiments. Headline gate: median
  # ≥1.3× decode tok/s on the dense 27B (single-slot, greedy, thinking-on).
  # PREVIEW=1 gate: community DFlash drafts are pre-canonical-release.
  qwen36-27b-dflash:
    <<: *llm-base
    profiles: [qwen36-27b-dflash]
    container_name: rotorquant-qwen36-27b-dflash
    environment:
      MODEL_NAME: qwen3.6-27b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-131072}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-1}
      CACHE_RAM: ${CACHE_RAM:-8192}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}
      SPECULATIVE_MODE: dflash
      DRAFT_MODEL_NAME: qwen3.6-27b-dflash
      DRAFT_KV_CACHE_TYPE: ${DRAFT_KV_CACHE_TYPE:-planar3}
      DRAFT_N_MAX: ${DRAFT_N_MAX:-16}
      PREVIEW: ${PREVIEW:-0}

  reasoning:
    <<: *llm-base
    profiles: [reasoning]
    container_name: rotorquant-reasoning
    environment:
      MODEL_NAME: qwen3.5-27b-reasoning
      # Dense model: planar3 beats iso3 on PPL at same compression (4.9x)
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  gemma:
    <<: *llm-base
    profiles: [gemma]
    container_name: rotorquant-gemma
    environment:
      MODEL_NAME: gemma4-26b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── 16 GB GPU profiles (imatrix quants) ──────────────────────────
  qwen-q3:
    <<: *llm-base
    profiles: [qwen-q3]
    container_name: rotorquant-qwen-q3
    environment:
      MODEL_NAME: qwen3.5-27b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen-q3-xxs:
    <<: *llm-base
    profiles: [qwen-q3-xxs]
    container_name: rotorquant-qwen-q3-xxs
    environment:
      MODEL_NAME: qwen3.5-27b-q3-xxs
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen-iq4:
    <<: *llm-base
    profiles: [qwen-iq4]
    container_name: rotorquant-qwen-iq4
    environment:
      MODEL_NAME: qwen3.5-27b-iq4
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar3}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  gemma-q3:
    <<: *llm-base
    profiles: [gemma-q3]
    container_name: rotorquant-gemma-q3
    environment:
      MODEL_NAME: gemma4-26b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── Qwen3.6 max throughput: 8 slots × 65K ctx, iso3, RTX 5090 ──
  # iso3 P=8 ctx=524288: 65K/slot, KV ~7.1 GB, total ~28.7 GB — same budget as qwen default
  # Use for aggregate throughput benchmarking; per-slot ctx = 65K
  qwen36-throughput:
    <<: *llm-base
    profiles: [qwen36-throughput]
    container_name: rotorquant-qwen36-tp
    environment:
      MODEL_NAME: qwen3.6-35b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-iso3}
      # 524,288 = 65,536 × 8 → 65K ctx per slot at N_PARALLEL=8
      CTX_SIZE: ${CTX_SIZE:-524288}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-8}
      CACHE_RAM: ${CACHE_RAM:-2048}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── Throughput profiles (max parallel slots, 16K context) ────────
  qwen-throughput:
    <<: *llm-base
    profiles: [qwen-throughput]
    container_name: rotorquant-qwen-tp
    environment:
      MODEL_NAME: qwen3.5-27b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-16384}
      N_PARALLEL: ${N_PARALLEL:-14}
      CACHE_RAM: ${CACHE_RAM:-8192}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen-throughput-q3:
    <<: *llm-base
    profiles: [qwen-throughput-q3]
    container_name: rotorquant-qwen-tp-q3
    environment:
      MODEL_NAME: qwen3.5-27b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-16384}
      N_PARALLEL: ${N_PARALLEL:-4}
      CACHE_RAM: ${CACHE_RAM:-8192}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

volumes:
  llm-models:
    name: llm-models
