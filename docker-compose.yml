# RotorQuant LLM Server — Docker Compose with model profiles
#
# Usage:
#   docker compose --profile qwen up          # Qwen3.5-27B (base)
#   docker compose --profile reasoning up     # Qwen3.5-27B Claude Reasoning Distilled
#   docker compose --profile gemma up         # Gemma 4 26B MoE
#
# Configuration via env vars:
#   KV_CACHE_TYPE=f16 docker compose --profile qwen up     # disable RotorQuant
#   CTX_SIZE=32768 docker compose --profile qwen up        # override context (default per-model)
#   PORT=9090 docker compose --profile qwen up -p 9090:9090
#
# Throughput mode (parallel slots):
#   docker compose --profile qwen-throughput up            # 14 slots × 16K on 32GB

x-llm-base: &llm-base
  image: rotorquant:latest
  build:
    context: .
    dockerfile: docker/Dockerfile
  volumes:
    - llm-models:/models
    - ${HF_HOME:-${HOME}/.cache/huggingface}/token:/home/llm/.cache/huggingface/token:ro
  ports:
    - "${PORT:-8080}:${PORT:-8080}"
  environment:
    KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
    CTX_SIZE: ${CTX_SIZE:-}
    PORT: ${PORT:-8080}
    GPU_LAYERS: ${GPU_LAYERS:-99}
    N_PARALLEL: ${N_PARALLEL:-2}
    CACHE_RAM: ${CACHE_RAM:-8192}
    HF_TOKEN: ${HF_TOKEN:-}
    EXTRA_ARGS: ${EXTRA_ARGS:-}
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  restart: unless-stopped

services:
  qwen:
    <<: *llm-base
    profiles: [qwen]
    container_name: rotorquant-qwen
    environment:
      MODEL_NAME: qwen3.6-35b
      # iso3: K+V both at 0.875 bpe — enables full 262K context per slot
      # iso3 P=2 ctx=524288: 262K/slot (full training ctx), KV ~7.1 GB, total ~28.7 GB
      # planar3 alternative (better quality, K stays f16): P=2 max at same VRAM budget
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-iso3}
      # 524,288 = 262,144 × 2 → full training context per slot at N_PARALLEL=2
      CTX_SIZE: ${CTX_SIZE:-524288}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-2}
      CACHE_RAM: ${CACHE_RAM:-2048}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen36-q3:
    <<: *llm-base
    profiles: [qwen36-q3]
    container_name: rotorquant-qwen36-q3
    environment:
      MODEL_NAME: qwen3.6-35b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen36-iq3:
    <<: *llm-base
    profiles: [qwen36-iq3]
    container_name: rotorquant-qwen36-iq3
    environment:
      MODEL_NAME: qwen3.6-35b-iq3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  reasoning:
    <<: *llm-base
    profiles: [reasoning]
    container_name: rotorquant-reasoning
    environment:
      MODEL_NAME: qwen3.5-27b-reasoning
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  gemma:
    <<: *llm-base
    profiles: [gemma]
    container_name: rotorquant-gemma
    environment:
      MODEL_NAME: gemma4-26b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── 16 GB GPU profiles (imatrix quants) ──────────────────────────
  qwen-q3:
    <<: *llm-base
    profiles: [qwen-q3]
    container_name: rotorquant-qwen-q3
    environment:
      MODEL_NAME: qwen3.5-27b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen-q3-xxs:
    <<: *llm-base
    profiles: [qwen-q3-xxs]
    container_name: rotorquant-qwen-q3-xxs
    environment:
      MODEL_NAME: qwen3.5-27b-q3-xxs
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen-iq4:
    <<: *llm-base
    profiles: [qwen-iq4]
    container_name: rotorquant-qwen-iq4
    environment:
      MODEL_NAME: qwen3.5-27b-iq4
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  gemma-q3:
    <<: *llm-base
    profiles: [gemma-q3]
    container_name: rotorquant-gemma-q3
    environment:
      MODEL_NAME: gemma4-26b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-}
      CACHE_RAM: ${CACHE_RAM:-}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── Qwen3.6 max throughput: 8 slots × 65K ctx, iso3, RTX 5090 ──
  # iso3 P=8 ctx=524288: 65K/slot, KV ~7.1 GB, total ~28.7 GB — same budget as qwen default
  # Use for aggregate throughput benchmarking; per-slot ctx = 65K
  qwen36-throughput:
    <<: *llm-base
    profiles: [qwen36-throughput]
    container_name: rotorquant-qwen36-tp
    environment:
      MODEL_NAME: qwen3.6-35b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-iso3}
      # 524,288 = 65,536 × 8 → 65K ctx per slot at N_PARALLEL=8
      CTX_SIZE: ${CTX_SIZE:-524288}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      N_PARALLEL: ${N_PARALLEL:-8}
      CACHE_RAM: ${CACHE_RAM:-2048}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  # ── Throughput profiles (max parallel slots, 16K context) ────────
  qwen-throughput:
    <<: *llm-base
    profiles: [qwen-throughput]
    container_name: rotorquant-qwen-tp
    environment:
      MODEL_NAME: qwen3.5-27b
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-16384}
      N_PARALLEL: ${N_PARALLEL:-14}
      CACHE_RAM: ${CACHE_RAM:-8192}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

  qwen-throughput-q3:
    <<: *llm-base
    profiles: [qwen-throughput-q3]
    container_name: rotorquant-qwen-tp-q3
    environment:
      MODEL_NAME: qwen3.5-27b-q3
      KV_CACHE_TYPE: ${KV_CACHE_TYPE:-planar4}
      CTX_SIZE: ${CTX_SIZE:-16384}
      N_PARALLEL: ${N_PARALLEL:-4}
      CACHE_RAM: ${CACHE_RAM:-8192}
      PORT: ${PORT:-8080}
      GPU_LAYERS: ${GPU_LAYERS:-99}
      HF_TOKEN: ${HF_TOKEN:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}

volumes:
  llm-models:
    name: llm-models
