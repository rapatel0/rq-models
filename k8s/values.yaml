# Default values for rotorquant.
# See README.md for end-to-end examples and the bench-driven topology guide.

# Image to deploy. The image must already exist in a registry your cluster
# can pull from. Build with:
#   docker build -t <repo>/rotorquant:<tag> -f docker/Dockerfile .
# For V100 / Volta hosts, pin CUDA 12.6 (CUDA 13.x dropped sm_70):
#   docker build --build-arg CUDA_VERSION=12.6.3 --build-arg CUDA_ARCHES=70 \
#     -t <repo>/rotorquant:v0-v100 -f docker/Dockerfile .
image:
  repository: rotorquant
  tag: latest
  # IfNotPresent is the right default for a tagged image — Always re-pulls
  # every restart, which is wasteful when the image hasn't changed.
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Topology — replicas × GPUs per replica. The bench-supported guidance is:
#
#   Model fits on one GPU?
#     Yes → 1 GPU per replica is fastest (no NVLink comm overhead).
#           Use replicaCount = number of concurrent users you want.
#     No  → gpusPerReplica = ceil(modelGB / GPU_VRAM_GB), splitMode=row.
#           Tensor parallelism only beats single-GPU when forced by memory.
#
# Bench data on Tesla V100-SXM2-32GB with Qwen3.6-27B Q4 (16 GB), planar3 KV,
# 256 K context: 1 GPU/replica = 30 t/s; 2 GPUs (TP, NVLink NV1/NV2) = 25 t/s;
# 4 GPUs (TP) = 21 t/s. TP loses on this hardware for any model that fits.
replicaCount: 1
gpusPerReplica: 1

# Recreate avoids GPU contention during rolls; pick RollingUpdate only if
# you have spare GPU capacity for both old and new pod simultaneously.
strategy:
  type: Recreate

# Required: which model to serve. Must match a key in MODELS in entrypoint.sh.
# qwen3.6-27b, qwen3.6-35b, qwen3.5-27b, qwen3.5-27b-reasoning, gemma4-26b, ...
modelName: qwen3.6-27b

# RotorQuant KV-cache type:
#   iso3      — best for MoE  (qwen3.6-35b)
#   planar3   — best for dense (qwen3.6-27b, qwen3.5-27b)        ← default
#   planar4 / iso4 — symmetric variants, slightly higher quality, less compression
#   f16       — disables RotorQuant (baseline)
kvCacheType: planar3

# Context size in tokens. Empty = use the per-model default from entrypoint.
# llama.cpp divides this by nParallel for per-slot context, so for max
# per-request context set nParallel=1.
contextSize: ""

# Concurrent slots per replica. nParallel=1 maximizes per-request decode rate
# and per-slot context. Bump to batch more concurrent users at lower per-user
# latency.
nParallel: 1

# Prompt cache size in MiB (system RAM, not VRAM).
cacheRam: 8192

# Layers offloaded to GPU. 99 = all (recommended).
gpuLayers: 99

# Multi-GPU controls (only meaningful when gpusPerReplica > 1):
splitMode: ""        # layer | row | none.  "" = llama.cpp default (layer)
tensorSplit: ""      # e.g. "1,1,1,1" — proportional per-GPU weight share
mainGpu: ""          # 0..N-1 — which GPU is primary

# HuggingFace token. Empty = pull public repos only (Unsloth GGUFs are public).
# When needed, create a Secret named `<release>-hf-token` with key `token`,
# or override via existingHfTokenSecret.
hfToken: ""
existingHfTokenSecret: ""    # if set, expects key `token`

# Extra raw flags appended to llama-server invocation.
extraArgs: ""

# Pod-level security context. Local hostPath / local-static-provisioner PVs
# arrive owned by root with no fsGroup remap; the image's `llm` user can't
# write to them. Default to root for portability across both PV kinds. If
# you're using NFS with proper export options + fsGroup support, you can
# clear this and let the image's USER llm (uid 1001) take effect.
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# Pod placement. Default: any node with NVIDIA GPUs.
# For local-PV setups pinned to a specific node, override with hostname:
#   nodeSelector: {kubernetes.io/hostname: gpu-01}
nodeSelector:
  nvidia.com/gpu.present: "true"
tolerations: []
affinity: {}

# DNS overrides. Useful when the cluster's CoreDNS upstream is flaky for
# external resolution (e.g. during HF downloads). Default off — opt in by
# setting `enabled: true`. Nameservers list is appended to whatever cluster
# DNS provides (when policy=ClusterFirst), or replaces it entirely (None).
dnsConfig:
  enabled: false
  policy: None     # None | ClusterFirst | ClusterFirstWithHostNet | Default
  nameservers:
    - "1.1.1.1"
    - "8.8.8.8"
  searches: []     # extra search domains; cluster ones added if policy=None

# ============================================================================
# Model storage
# ============================================================================
#
# Two patterns supported:
#
#   kind: nfs    — RWX PVC backed by NFS (or other RWX storage). Shared across
#                  replicas, downloaded once. Network read at startup. Right
#                  for multi-node clusters or cross-deployment cache sharing.
#
#   kind: local  — Pre-existing PVC bound to a node-local PV. Faster startup
#                  (local NVMe), pinned to one node. Right for single-node
#                  GPU setups, or any case where storing model files on
#                  shared storage isn't worth it.
#
# Storage convention for this stack: model files (anything reproducible from
# a URL — HF GGUFs, Ollama pulls, base weights you didn't train) belong on
# `local`. Only training artifacts and app state belong on RWX/persistent.
#
# When kind=local, you can either:
#   (a) Pre-create the PVC + hydrate it manually (set existingClaim), or
#   (b) Have the chart render a hydration Job that runs `hf download` against
#       an existing PVC before the deployment starts (set models.hydrate.enabled).
#
# The chart never creates cluster-scoped resources (StorageClass, PV) on your
# behalf — those are operator-owned. See the chart README for sample
# StorageClass + PV manifests for both kinds.
models:
  kind: nfs               # nfs | local

  # kind=nfs only: chart auto-creates a RWX PVC with these specs.
  storageClass: nfs-rwx
  size: 80Gi

  # kind=local: required (unless hydrate.enabled creates the PVC for you).
  # kind=nfs: optional override of the auto-created PVC name.
  existingClaim: ""

  # Mount /models as read-only inside pods. Inference never writes; only
  # the hydration step does. Defensive default.
  readOnly: true

  # Optional: render a one-shot hydration Job that runs `hf download` into
  # the PVC before the deployment starts. The Job uses the same image as
  # the server (which ships `hf` CLI). Pinned to nodeSelector.
  #
  # The Job uses the same PVC as the deployment (existingClaim). Mounts
  # /models read-write for the duration of hydration; the deployment can
  # still mount it read-only because RWO local PVs allow multiple pods on
  # the same node.
  hydrate:
    enabled: false
    hfRepo: ""             # e.g. unsloth/Qwen3.6-27B-GGUF
    hfFile: ""             # e.g. Qwen3.6-27B-UD-Q4_K_XL.gguf
    # nodeSelector for the hydration Job (must match the local PV's affinity)
    nodeSelector: {}

# Service: ClusterIP by default. The Ingress (below) is the public entrypoint.
service:
  type: ClusterIP
  port: 80
  # Optional: override targetPort if you change PORT env var
  targetPort: 8080

ingress:
  enabled: true
  className: public
  host: rotorquant.homelab.local
  tls:
    enabled: true
    secretName: rotorquant-tls
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca-issuer
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"

# In-cluster session-pinning router. When enabled, the public Service
# (`<release>-rotorquant`) selects an nginx Deployment that consistent-hashes
# requests on the X-Hermes-Session-Id header (random fallback when absent),
# proxying to a headless backends Service that selects the rotorquant pods.
# The Service name and DNS stay identical, so clients are unaware. Set to
# false to restore direct routing — the public Service then selects the
# rotorquant pods directly.
router:
  enabled: true
  replicas: 2
  image:
    repository: nginx
    tag: "1.27-alpine"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Observability — emits a Prometheus ServiceMonitor pointing at the
# llama-server `/metrics` endpoint on each backend pod. Requires the
# kube-prometheus-stack Prometheus operator (or any operator that
# watches monitoring.coreos.com/v1 ServiceMonitors).
#
# The entrypoint always passes `--metrics` to llama-server, so the
# /metrics endpoint is up regardless of this value. This switch only
# controls whether a ServiceMonitor is created.
observability:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: ""        # empty = Prometheus default (10s)
    # Default null = render in the Release namespace. Override to put
    # the SM in the Prometheus namespace if your operator is configured
    # with a strict `serviceMonitorNamespaceSelector`.
    namespace: ""
    # Extra labels — typical kube-prom-stack setups require
    # `release: kube-prom-stack` so the operator picks it up.
    additionalLabels:
      release: kube-prom-stack

# Resource requests/limits. nvidia.com/gpu is set automatically from
# gpusPerReplica above. CPU/memory below are sane defaults for serving.
resources:
  requests:
    cpu: "2"
    memory: 8Gi
  limits:
    memory: 32Gi

# Liveness/readiness probes — generous timeouts to cover first model download
# (~5–10 min for a 16 GB GGUF over LAN).
probes:
  readiness:
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 60        # 10 min total
  liveness:
    initialDelaySeconds: 600    # don't kill during slow first download
    periodSeconds: 30
    failureThreshold: 5
